<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT CLUB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1f1147 0%, #3a1c71 40%, #ff6f91 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 16px;
  }
  .card {
    background: rgba(20, 10, 40, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 440px;
    padding: 32px;
    backdrop-filter: blur(8px);
  }
  .logo { text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 4px; letter-spacing: 1px; }
  .logo span { color: #ff6f91; }
  .sub { text-align:center; color:#cbb9ff; font-size:13px; margin-bottom:24px; }
  input {
    width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
    color: #fff; font-size: 15px;
  }
  input::placeholder { color: #ccc; }
  button {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #ff6f91, #ff9472);
    color: #1f1147; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .ghostBtn {
    background: transparent; border: 1px solid rgba(255,255,255,0.25); color: #fff; margin-top: 10px;
  }
  .error { color: #ff8585; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 16px; }
  .ok { color: #8aff9e; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 16px; }
  .linkLine { text-align:center; font-size: 12px; color:#cbb9ff; margin-top: 16px; }
  .linkLine a { color: #ff9472; cursor: pointer; text-decoration: underline; }

  /* Chat screen */
  #chatScreen { display:none; width:100%; max-width: 480px; height: 80vh; }
  .chatBox {
    background: rgba(20,10,40,0.9); border-radius: 18px; border: 1px solid rgba(255,255,255,0.15);
    height: 100%; display: flex; flex-direction: column; overflow: hidden;
  }
  .chatHeader {
    padding: 16px 20px; background: rgba(255,255,255,0.05); display: flex;
    justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .chatHeader .title { font-weight: 800; font-size: 18px; }
  .chatHeader .title span { color: #ff6f91; }
  .logout {
    background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    padding: 6px 12px; width: auto; font-size: 12px; border-radius: 8px;
  }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
  .msg .name { font-size: 11px; color: #ff9472; margin-bottom: 3px; font-weight: 700; }
  .msg.me { align-self: flex-start; background: linear-gradient(135deg, #ff6f91, #ff9472); color: #1f1147; }
  .msg.other { align-self: flex-end; background: rgba(255,255,255,0.1); color: #fff; }
  .inputRow { display: flex; gap: 8px; padding: 14px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
  .inputRow input { margin-bottom: 0; }
  .inputRow button { width: auto; padding: 12px 20px; white-space: nowrap; }
  .loading { text-align:center; color:#cbb9ff; font-size: 13px; padding: 10px; }

  /* Admin screen */
  #adminScreen { display:none; width:100%; max-width: 520px; }
  .adminBox { background: rgba(20,10,40,0.9); border-radius: 18px; border: 1px solid rgba(255,255,255,0.15); padding: 24px; }
  .adminBox h2 { font-size: 18px; margin-bottom: 16px; }
  .adminBox h2 span { color: #ff6f91; }
  .addRow { display:flex; gap: 8px; margin-bottom: 18px; }
  .addRow input { margin-bottom: 0; flex: 1; }
  .addRow button { width: auto; padding: 12px 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  th { color: #cbb9ff; font-weight: 600; }
  td.pw { font-family: monospace; color: #8aff9e; }
  .delBtn { background: transparent; border: none; color: #ff8585; cursor: pointer; font-size: 13px; width: auto; padding: 4px 8px; }
  .empty { text-align:center; color:#cbb9ff; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

  <!-- Login Screen -->
  <div class="card" id="loginScreen">
    <div class="logo">🐱 CAT <span>CLUB</span></div>
    <div class="sub">سجل دخولك بالإيميل والباسورد اللي معاك</div>
    <div class="error" id="loginError"></div>
    <input type="text" id="email" placeholder="example@catclub" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="handleLogin()" id="loginBtn">دخول</button>
    <div class="linkLine"><a onclick="showAdminLogin()">دخول الأدمن</a></div>
  </div>

  <!-- Admin login (password gate) -->
  <div class="card" id="adminLoginScreen" style="display:none;">
    <div class="logo">🔑 <span>ADMIN</span></div>
    <div class="sub">باسورد الأدمن</div>
    <div class="error" id="adminLoginError"></div>
    <input type="password" id="adminPassword" placeholder="Admin password">
    <button onclick="checkAdminPassword()">دخول لوحة التحكم</button>
    <div class="linkLine"><a onclick="backToLogin()">رجوع لتسجيل الدخول</a></div>
  </div>

  <!-- Admin panel -->
  <div id="adminScreen">
    <div class="adminBox">
      <h2>لوحة تحكم <span>CAT CLUB</span></h2>
      <div class="error" id="adminError"></div>
      <div class="ok" id="adminOk"></div>
      <div class="addRow">
        <input type="text" id="newEmailPrefix" placeholder="اسم الإيميل (قبل @catclub)">
        <button onclick="addEmail()">إضافة + توليد باسورد</button>
      </div>
      <table id="usersTable">
        <thead><tr><th>الإيميل</th><th>الباسورد</th><th></th></tr></thead>
        <tbody id="usersTableBody"></tbody>
      </table>
      <div class="linkLine"><a onclick="adminLogout()">تسجيل خروج الأدمن</a></div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen">
    <div class="chatBox">
      <div class="chatHeader">
        <div class="title">🐱 CAT <span>CLUB</span></div>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
      <div id="messages"><div class="loading">جاري تحميل الرسائل...</div></div>
      <div class="inputRow">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ارسال</button>
      </div>
    </div>
  </div>

<script>
// IMPORTANT: only Ammar should know this. Change it any time by editing this constant.
const ADMIN_PASSWORD = "eqrXUhazBxXct7";
const DOMAIN = "@catclub";

let currentUser = null;
let pollInterval = null;

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function generatePassword(len = 10) {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
  let pw = "";
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
  return pw;
}

async function getUsers() {
  try {
    const result = await window.storage.get('cat_club_allowed_users', true);
    return result ? JSON.parse(result.value) : {};
  } catch (e) {
    return {};
  }
}
async function saveUsers(users) {
  await window.storage.set('cat_club_allowed_users', JSON.stringify(users), true);
}

// ---------- Regular login (only pre-added @catclub emails work) ----------
async function handleLogin() {
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  let email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    errorEl.textContent = 'من فضلك اكتب الإيميل وكلمة السر';
    return;
  }
  if (!email.endsWith(DOMAIN)) {
    errorEl.textContent = 'الإيميل لازم يكون بصيغة xxx' + DOMAIN;
    return;
  }

  btn.disabled = true;
  btn.textContent = '...جاري التحقق';

  try {
    const users = await getUsers();
    const record = users[email];
    if (!record || record.password !== password) {
      errorEl.textContent = 'الإيميل ده مش متسجل أو الباسورد غلط';
      return;
    }
    currentUser = email;
    enterChat();
  } catch (e) {
    errorEl.textContent = 'حصل خطأ، حاول تاني';
  } finally {
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
}

// ---------- Admin gate ----------
function showAdminLogin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminLoginScreen').style.display = 'block';
}
function backToLogin() {
  document.getElementById('adminLoginScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminLoginError').textContent = '';
  document.getElementById('adminPassword').value = '';
}
function checkAdminPassword() {
  const errorEl = document.getElementById('adminLoginError');
  const entered = document.getElementById('adminPassword').value;
  if (entered !== ADMIN_PASSWORD) {
    errorEl.textContent = 'باسورد الأدمن غلط';
    return;
  }
  document.getElementById('adminLoginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadUsersTable();
}
function adminLogout() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminPassword').value = '';
}

// ---------- Admin panel logic ----------
async function loadUsersTable() {
  const users = await getUsers();
  renderUsersTable(users);
}

function renderUsersTable(users) {
  const tbody = document.getElementById('usersTableBody');
  const emails = Object.keys(users);
  if (emails.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">لسه مفيش إيميلات مضافة</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  emails.forEach(email => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + escapeHtml(email) + '</td>' +
      '<td class="pw">' + escapeHtml(users[email].password) + '</td>' +
      '<td><button class="delBtn" onclick="deleteEmail(\'' + email.replace(/'/g,"\\'") + '\')">حذف</button></td>';
    tbody.appendChild(tr);
  });
}

async function addEmail() {
  const errorEl = document.getElementById('adminError');
  const okEl = document.getElementById('adminOk');
  errorEl.textContent = '';
  okEl.textContent = '';

  const prefixInput = document.getElementById('newEmailPrefix');
  let prefix = prefixInput.value.trim().toLowerCase();
  prefix = prefix.replace(/@.*$/, ''); // in case they typed the full domain too

  if (!prefix) {
    errorEl.textContent = 'اكتب اسم قبل @catclub';
    return;
  }
  if (!/^[a-z0-9._-]+$/.test(prefix)) {
    errorEl.textContent = 'استخدم حروف/أرقام إنجليزية بس بدون مسافات';
    return;
  }

  const email = prefix + DOMAIN;
  const users = await getUsers();
  if (users[email]) {
    errorEl.textContent = 'الإيميل ده متضاف قبل كده';
    return;
  }

  const password = generatePassword(10);
  users[email] = { password: password, createdAt: Date.now() };
  await saveUsers(users);
  prefixInput.value = '';
  okEl.textContent = 'تم إضافة ' + email + ' — باسوردها: ' + password;
  renderUsersTable(users);
}

async function deleteEmail(email) {
  const users = await getUsers();
  delete users[email];
  await saveUsers(users);
  renderUsersTable(users);
}

// ---------- Chat ----------
function enterChat() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'block';
  loadMessages();
  pollInterval = setInterval(loadMessages, 3000);
}

function logout() {
  currentUser = null;
  clearInterval(pollInterval);
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
  document.getElementById('loginError').textContent = '';
}

async function loadMessages() {
  try {
    const result = await window.storage.get('cat_club_messages', true);
    const messages = result ? JSON.parse(result.value) : [];
    renderMessages(messages);
  } catch (e) {
    renderMessages([]);
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (messages.length === 0) {
    container.innerHTML = '<div class="loading">لسه مفيش رسائل، ابدأ المحادثة!</div>';
    return;
  }
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user === currentUser ? 'me' : 'other');
    div.innerHTML = '<div class="name">' + escapeHtml(m.user) + '</div>' + escapeHtml(m.text);
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = '';
  input.disabled = true;

  try {
    let messages = [];
    try {
      const result = await window.storage.get('cat_club_messages', true);
      messages = result ? JSON.parse(result.value) : [];
    } catch (e) {
      messages = [];
    }
    messages.push({ user: currentUser, text: text, time: Date.now() });
    if (messages.length > 200) messages.splice(0, messages.length - 200);

    const saveResult = await window.storage.set('cat_club_messages', JSON.stringify(messages), true);
    if (!saveResult) throw new Error('Save failed');
    renderMessages(messages);
  } catch (e) {
    console.error('Send error:', e);
    alert('حصل خطأ وإحنا بنبعت الرسالة، حاول تاني');
    input.value = text;
  } finally {
    input.disabled = false;
    input.focus();
  }
}
</script>

</body>
</html>
