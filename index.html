<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT CLUB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    height: 100vh;
    background: linear-gradient(135deg, #1f1147 0%, #3a1c71 40%, #ff6f91 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .card {
    background: rgba(20, 10, 40, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 420px;
    padding: 32px;
    backdrop-filter: blur(8px);
  }
  .logo {
    text-align: center;
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .logo span { color: #ff6f91; }
  .sub { text-align:center; color:#cbb9ff; font-size:13px; margin-bottom:24px; }
  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
  }
  input::placeholder { color: #ccc; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff6f91, #ff9472);
    color: #1f1147;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  .error { color: #ff8585; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 16px; }

  /* Chat screen */
  #chatScreen { display:none; width:100%; max-width: 480px; height: 80vh; }
  .chatBox {
    background: rgba(20,10,40,0.9);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chatHeader {
    padding: 16px 20px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .chatHeader .title { font-weight: 800; font-size: 18px; }
  .chatHeader .title span { color: #ff6f91; }
  .logout {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 6px 12px;
    width: auto;
    font-size: 12px;
    border-radius: 8px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg .name { font-size: 11px; color: #ff9472; margin-bottom: 3px; font-weight: 700; }
  .msg.me {
    align-self: flex-start;
    background: linear-gradient(135deg, #ff6f91, #ff9472);
    color: #1f1147;
  }
  .msg.other {
    align-self: flex-end;
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .inputRow {
    display: flex;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
  }
  .inputRow input { margin-bottom: 0; }
  .inputRow button { width: auto; padding: 12px 20px; }
  .loading { text-align:center; color:#cbb9ff; font-size: 13px; padding: 10px; }
</style>
</head>
<body>

  <!-- Login Screen -->
  <div class="card" id="loginScreen">
    <div class="logo">🐱 CAT <span>CLUB</span></div>
    <div class="sub">سجل دخولك عشان تدخل الشات</div>
    <div class="error" id="loginError"></div>
    <input type="text" id="username" placeholder="اسم المستخدم" maxlength="20">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen">
    <div class="chatBox">
      <div class="chatHeader">
        <div class="title">🐱 CAT <span>CLUB</span></div>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
      <div id="messages"><div class="loading">جاري تحميل الرسائل...</div></div>
      <div class="inputRow">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ارسال</button>
      </div>
    </div>
  </div>

<script>
let currentUser = null;
let pollInterval = null;

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  if (!username || !password) {
    errorEl.textContent = 'من فضلك اكتب اسم المستخدم وكلمة السر';
    return;
  }
  if (username.length < 2) {
    errorEl.textContent = 'اسم المستخدم لازم يكون أكتر من حرف';
    return;
  }

  currentUser = username;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'block';
  loadMessages();
  pollInterval = setInterval(loadMessages, 3000);
}

function logout() {
  currentUser = null;
  clearInterval(pollInterval);
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

async function loadMessages() {
  try {
    const result = await window.storage.get('cat_club_messages', true);
    const messages = result ? JSON.parse(result.value) : [];
    renderMessages(messages);
  } catch (e) {
    renderMessages([]);
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (messages.length === 0) {
    container.innerHTML = '<div class="loading">لسه مفيش رسائل، ابدأ المحادثة!</div>';
    return;
  }
  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user === currentUser ? 'me' : 'other');
    div.innerHTML = '<div class="name">' + escapeHtml(m.user) + '</div>' + escapeHtml(m.text);
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  try {
    const result = await window.storage.get('cat_club_messages', true);
    const messages = result ? JSON.parse(result.value) : [];
    messages.push({ user: currentUser, text: text, time: Date.now() });
    if (messages.length > 200) messages.splice(0, messages.length - 200);
    await window.storage.set('cat_club_messages', JSON.stringify(messages), true);
    renderMessages(messages);
  } catch (e) {
    console.error('Send error:', e);
  }
}
</script>

</body>
</html>
