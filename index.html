<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT CLUB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1f1147 0%, #3a1c71 40%, #ff6f91 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 16px;
  }
  .card {
    background: rgba(20, 10, 40, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 440px;
    padding: 32px;
    backdrop-filter: blur(8px);
  }
  .logo { text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 4px; letter-spacing: 1px; }
  .logo span { color: #ff6f91; }
  .sub { text-align:center; color:#cbb9ff; font-size:13px; margin-bottom:24px; }
  input {
    width: 100%; padding: 14px; margin-bottom: 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
    color: #fff; font-size: 15px;
  }
  input::placeholder { color: #ccc; }
  button {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #ff6f91, #ff9472);
    color: #1f1147; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { color: #ff8585; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 16px; }
  .ok { color: #8aff9e; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 16px; }
  .linkLine { text-align:center; font-size: 12px; color:#cbb9ff; margin-top: 16px; }
  .linkLine a { color: #ff9472; cursor: pointer; text-decoration: underline; }

  #chatScreen { display:none; width:100%; max-width: 480px; height: 80vh; }
  .chatBox {
    background: rgba(20,10,40,0.9); border-radius: 18px; border: 1px solid rgba(255,255,255,0.15);
    height: 100%; display: flex; flex-direction: column; overflow: hidden;
  }
  .chatHeader {
    padding: 16px 20px; background: rgba(255,255,255,0.05); display: flex;
    justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .chatHeader .title { font-weight: 800; font-size: 18px; }
  .chatHeader .title span { color: #ff6f91; }
  .logout {
    background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff;
    padding: 6px 12px; width: auto; font-size: 12px; border-radius: 8px;
  }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; }
  .msg .name { font-size: 11px; color: #ff9472; margin-bottom: 3px; font-weight: 700; }
  .msg.me { align-self: flex-start; background: linear-gradient(135deg, #ff6f91, #ff9472); color: #1f1147; }
  .msg.other { align-self: flex-end; background: rgba(255,255,255,0.1); color: #fff; }
  .replyPreview {
    font-size: 12px; opacity: 0.75; border-right: 3px solid rgba(0,0,0,0.3);
    padding: 4px 8px; margin-bottom: 6px; border-radius: 6px; background: rgba(0,0,0,0.12); cursor: pointer;
  }
  .msg.other .replyPreview { border-right: none; border-left: 3px solid rgba(255,255,255,0.3); }
  .msgActions { display:flex; gap: 6px; margin-top: 6px; align-items:center; flex-wrap: wrap; }
  .actionBtn {
    width:auto; padding: 2px 8px; font-size: 12px; background: rgba(0,0,0,0.15); color: inherit;
    border: none; border-radius: 10px; cursor: pointer; opacity: 0.85;
  }
  .msg.other .actionBtn { background: rgba(255,255,255,0.12); }
  .actionBtn:hover { opacity: 1; }
  .reactionsRow { display:flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .reactionChip {
    width:auto; font-size: 12px; padding: 2px 7px; border-radius: 10px; border: none;
    background: rgba(0,0,0,0.18); color: inherit; cursor: pointer;
  }
  .msg.other .reactionChip { background: rgba(255,255,255,0.15); }
  .reactionChip.mine { outline: 1px solid #ff9472; }
  .emojiPicker {
    display:none; position: absolute; top: -38px; background: #2b1758; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 4px 6px; gap: 4px; z-index: 5; box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .msg.other .emojiPicker { right: 0; }
  .msg.me .emojiPicker { left: 0; }
  .emojiPicker.show { display:flex; }
  .emojiPicker span { cursor: pointer; font-size: 16px; padding: 2px; }
  .replyBar {
    display:none; background: rgba(255,255,255,0.08); border-right: 3px solid #ff6f91;
    padding: 8px 12px; margin: 0 14px; border-radius: 8px; font-size: 12px; color: #cbb9ff;
    align-items: center; justify-content: space-between;
  }
  .replyBar.show { display:flex; }
  .replyBar .cancelReply { width:auto; background:none; color:#ff8585; font-size: 16px; padding:0 6px; }
  .inputRow { display: flex; gap: 8px; padding: 14px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
  .inputRow input { margin-bottom: 0; }
  .inputRow button { width: auto; padding: 12px 20px; white-space: nowrap; }
  .loading { text-align:center; color:#cbb9ff; font-size: 13px; padding: 10px; }

  #adminScreen { display:none; width:100%; max-width: 520px; }
  .adminBox { background: rgba(20,10,40,0.9); border-radius: 18px; border: 1px solid rgba(255,255,255,0.15); padding: 24px; }
  .adminBox h2 { font-size: 18px; margin-bottom: 16px; }
  .adminBox h2 span { color: #ff6f91; }
  .addRow { display:flex; gap: 8px; margin-bottom: 18px; }
  .addRow input { margin-bottom: 0; flex: 1; }
  .addRow button { width: auto; padding: 12px 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  th { color: #cbb9ff; font-weight: 600; }
  td.pw { font-family: monospace; color: #8aff9e; }
  .delBtn { background: transparent; border: none; color: #ff8585; cursor: pointer; font-size: 13px; width: auto; padding: 4px 8px; }
  .empty { text-align:center; color:#cbb9ff; font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

  <div class="card" id="loginScreen">
    <div class="logo">🐱 CAT <span>CLUB</span></div>
    <div class="sub">سجل دخولك بالإيميل والباسورد اللي معاك</div>
    <div class="error" id="loginError"></div>
    <input type="text" id="email" placeholder="example@catclub" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="handleLogin()" id="loginBtn">دخول</button>
    <div class="linkLine"><a onclick="showAdminLogin()">دخول الأدمن</a></div>
  </div>

  <div class="card" id="adminLoginScreen" style="display:none;">
    <div class="logo">🔑 <span>ADMIN</span></div>
    <div class="sub">باسورد الأدمن</div>
    <div class="error" id="adminLoginError"></div>
    <input type="password" id="adminPassword" placeholder="Admin password">
    <button onclick="checkAdminPassword()">دخول لوحة التحكم</button>
    <div class="linkLine"><a onclick="backToLogin()">رجوع لتسجيل الدخول</a></div>
  </div>

  <div id="adminScreen">
    <div class="adminBox">
      <h2>لوحة تحكم <span>CAT CLUB</span></h2>
      <div class="error" id="adminError"></div>
      <div class="ok" id="adminOk"></div>
      <div class="addRow">
        <input type="text" id="newEmailPrefix" placeholder="اسم الإيميل (قبل @catclub)">
      </div>
      <div class="addRow" id="pwModeRow">
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:#cbb9ff; width:auto; white-space:nowrap;">
          <input type="radio" name="pwMode" value="auto" checked onchange="togglePwMode()" style="width:auto; margin:0;"> باسورد عشوائي
        </label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:#cbb9ff; width:auto; white-space:nowrap;">
          <input type="radio" name="pwMode" value="manual" onchange="togglePwMode()" style="width:auto; margin:0;"> أنا هكتبه
        </label>
      </div>
      <div class="addRow">
        <input type="text" id="manualPassword" placeholder="اكتب الباسورد هنا" style="display:none;">
        <button onclick="addEmail()" id="addEmailBtn">إضافة</button>
      </div>
      <table id="usersTable">
        <thead><tr><th>الإيميل</th><th>الباسورد</th><th></th></tr></thead>
        <tbody id="usersTableBody"></tbody>
      </table>
      <div class="linkLine"><a onclick="adminLogout()">تسجيل خروج الأدمن</a></div>
    </div>
  </div>

  <div id="chatScreen">
    <div class="chatBox">
      <div class="chatHeader">
        <div class="title">🐱 CAT <span>CLUB</span></div>
        <button class="logout" onclick="logout()">خروج</button>
      </div>
      <div id="messages"><div class="loading">جاري تحميل الرسائل...</div></div>
      <div class="replyBar" id="replyBar">
        <span id="replyBarText"></span>
        <button class="cancelReply" onclick="cancelReply()">✕</button>
      </div>
      <div class="inputRow">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ارسال</button>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, updateDoc,
  onSnapshot, query, orderBy, limit, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXa0Orfxu0aujl3DOYPy6ktR2v-UCCVsw",
  authDomain: "cat-club-a3cd3.firebaseapp.com",
  projectId: "cat-club-a3cd3",
  storageBucket: "cat-club-a3cd3.firebasestorage.app",
  messagingSenderId: "960443901199",
  appId: "1:960443901199:web:35c2ac910b1aed04ba4a7a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// IMPORTANT: only Ammar should know this.
const ADMIN_PASSWORD = "eqrXUhazBxXct7";
const DOMAIN = "@catclub";

let currentUser = null;
let unsubscribeMessages = null;
let replyingTo = null; // { id, user, text }
let latestMessages = [];
const REACTION_EMOJIS = ["❤️", "😂", "👍", "😮", "😢", "🔥"];

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function generatePassword(len = 10) {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
  let pw = "";
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pw += chars[arr[i] % chars.length];
  return pw;
}

// ---------- Users collection ----------
async function getAllUsers() {
  const snap = await getDocs(collection(db, "users"));
  const users = {};
  snap.forEach(d => { users[d.id] = d.data(); });
  return users;
}
async function getUser(email) {
  const snap = await getDoc(doc(db, "users", email));
  return snap.exists() ? snap.data() : null;
}
async function setUser(email, data) {
  await setDoc(doc(db, "users", email), data);
}
async function removeUser(email) {
  await deleteDoc(doc(db, "users", email));
}

// ---------- Regular login ----------
window.handleLogin = async function() {
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';

  let email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    errorEl.textContent = 'من فضلك اكتب الإيميل وكلمة السر';
    return;
  }
  if (!email.endsWith(DOMAIN)) {
    errorEl.textContent = 'الإيميل لازم يكون بصيغة xxx' + DOMAIN;
    return;
  }

  btn.disabled = true;
  btn.textContent = '...جاري التحقق';

  try {
    const record = await getUser(email);
    if (!record || record.password !== password) {
      errorEl.textContent = 'الإيميل ده مش متسجل أو الباسورد غلط';
      return;
    }
    currentUser = email;
    localStorage.setItem('catclub_session', email);
    enterChat();
  } catch (e) {
    console.error(e);
    errorEl.textContent = 'حصل خطأ في الاتصال، حاول تاني';
  } finally {
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
};

// ---------- Admin gate ----------
window.showAdminLogin = function() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminLoginScreen').style.display = 'block';
};
window.backToLogin = function() {
  document.getElementById('adminLoginScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminLoginError').textContent = '';
  document.getElementById('adminPassword').value = '';
};
window.checkAdminPassword = function() {
  const errorEl = document.getElementById('adminLoginError');
  const entered = document.getElementById('adminPassword').value;
  if (entered !== ADMIN_PASSWORD) {
    errorEl.textContent = 'باسورد الأدمن غلط';
    return;
  }
  document.getElementById('adminLoginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadUsersTable();
};
window.adminLogout = function() {
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminPassword').value = '';
};

// ---------- Admin panel ----------
async function loadUsersTable() {
  try {
    const users = await getAllUsers();
    renderUsersTable(users);
  } catch (e) {
    console.error(e);
    document.getElementById('usersTableBody').innerHTML =
      '<tr><td colspan="3" class="empty">حصل خطأ في تحميل البيانات</td></tr>';
  }
}

function renderUsersTable(users) {
  const tbody = document.getElementById('usersTableBody');
  const emails = Object.keys(users);
  if (emails.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">لسه مفيش إيميلات مضافة</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  emails.forEach(email => {
    const tr = document.createElement('tr');
    const delBtn = document.createElement('button');
    delBtn.className = 'delBtn';
    delBtn.textContent = 'حذف';
    delBtn.onclick = () => deleteEmail(email);

    const tdEmail = document.createElement('td');
    tdEmail.textContent = email;
    const tdPw = document.createElement('td');
    tdPw.className = 'pw';
    tdPw.textContent = users[email].password;
    const tdDel = document.createElement('td');
    tdDel.appendChild(delBtn);

    tr.appendChild(tdEmail);
    tr.appendChild(tdPw);
    tr.appendChild(tdDel);
    tbody.appendChild(tr);
  });
}

window.togglePwMode = function() {
  const manual = document.querySelector('input[name="pwMode"]:checked').value === 'manual';
  document.getElementById('manualPassword').style.display = manual ? 'block' : 'none';
};

window.addEmail = async function() {
  const errorEl = document.getElementById('adminError');
  const okEl = document.getElementById('adminOk');
  const addBtn = document.getElementById('addEmailBtn');
  errorEl.textContent = '';
  okEl.textContent = '';

  const prefixInput = document.getElementById('newEmailPrefix');
  let prefix = prefixInput.value.trim().toLowerCase();
  prefix = prefix.replace(/@.*$/, '');

  if (!prefix) {
    errorEl.textContent = 'اكتب اسم قبل @catclub';
    return;
  }
  if (!/^[a-z0-9._-]+$/.test(prefix)) {
    errorEl.textContent = 'استخدم حروف/أرقام إنجليزية بس بدون مسافات';
    return;
  }

  addBtn.disabled = true;
  addBtn.textContent = '...جاري الإضافة';

  try {
    const email = prefix + DOMAIN;
    const existing = await getUser(email);
    if (existing) {
      errorEl.textContent = 'الإيميل ده متضاف قبل كده';
      return;
    }

    const pwMode = document.querySelector('input[name="pwMode"]:checked').value;
    let password;
    if (pwMode === 'manual') {
      password = document.getElementById('manualPassword').value.trim();
      if (!password) {
        errorEl.textContent = 'اكتب الباسورد أو اختار "باسورد عشوائي"';
        return;
      }
      if (password.length < 4) {
        errorEl.textContent = 'الباسورد لازم يكون 4 حروف/أرقام على الأقل';
        return;
      }
    } else {
      password = generatePassword(10);
    }

    await setUser(email, { password: password, createdAt: Date.now() });
    prefixInput.value = '';
    document.getElementById('manualPassword').value = '';
    okEl.textContent = 'تم إضافة ' + email + ' — باسوردها: ' + password;
    loadUsersTable();
  } catch (e) {
    console.error('addEmail error:', e);
    errorEl.textContent = 'حصل خطأ في الحفظ، حاول تاني (' + (e.message || 'unknown') + ')';
  } finally {
    addBtn.disabled = false;
    addBtn.textContent = 'إضافة + توليد باسورد';
  }
};

window.deleteEmail = async function(email) {
  try {
    await removeUser(email);
    loadUsersTable();
  } catch (e) {
    console.error(e);
  }
};

// ---------- Chat ----------
function enterChat() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'block';
  listenMessages();
}

window.logout = function() {
  currentUser = null;
  localStorage.removeItem('catclub_session');
  if (unsubscribeMessages) unsubscribeMessages();
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
  document.getElementById('loginError').textContent = '';
};

// ---------- Auto-restore session on page load ----------
async function tryRestoreSession() {
  const savedEmail = localStorage.getItem('catclub_session');
  if (!savedEmail) return;
  try {
    const record = await getUser(savedEmail);
    if (record) {
      currentUser = savedEmail;
      enterChat();
    } else {
      localStorage.removeItem('catclub_session');
    }
  } catch (e) {
    console.error('session restore error', e);
  }
}
tryRestoreSession();

document.addEventListener('click', (ev) => {
  if (!ev.target.closest('.actionBtn') && !ev.target.closest('.emojiPicker')) {
    document.querySelectorAll('.emojiPicker.show').forEach(p => p.classList.remove('show'));
  }
});

function listenMessages() {
  const q = query(collection(db, "messages"), orderBy("time", "asc"), limit(200));
  unsubscribeMessages = onSnapshot(q, (snapshot) => {
    const messages = [];
    snapshot.forEach(d => messages.push({ id: d.id, ...d.data() }));
    renderMessages(messages);
  }, (error) => {
    console.error('listen error', error);
    document.getElementById('messages').innerHTML = '<div class="loading">حصل خطأ في تحميل الرسائل</div>';
  });
}

function renderMessages(messages) {
  latestMessages = messages;
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (messages.length === 0) {
    container.innerHTML = '<div class="loading">لسه مفيش رسائل، ابدأ المحادثة!</div>';
    return;
  }
  const byId = {};
  messages.forEach(m => { byId[m.id] = m; });

  messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user === currentUser ? 'me' : 'other');
    div.dataset.id = m.id;

    if (m.replyTo && byId[m.replyTo]) {
      const parent = byId[m.replyTo];
      const rp = document.createElement('div');
      rp.className = 'replyPreview';
      rp.textContent = parent.user + ': ' + parent.text.slice(0, 60);
      rp.onclick = () => {
        const target = container.querySelector('[data-id="' + m.replyTo + '"]');
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      };
      div.appendChild(rp);
    } else if (m.replyTo) {
      const rp = document.createElement('div');
      rp.className = 'replyPreview';
      rp.textContent = 'رسالة محذوفة';
      div.appendChild(rp);
    }

    const nameDiv = document.createElement('div');
    nameDiv.className = 'name';
    nameDiv.textContent = m.user;
    div.appendChild(nameDiv);
    div.appendChild(document.createTextNode(m.text));

    // reactions row
    const reactions = m.reactions || {};
    const reactionsRow = document.createElement('div');
    reactionsRow.className = 'reactionsRow';
    Object.keys(reactions).forEach(emoji => {
      const users = reactions[emoji] || [];
      if (users.length === 0) return;
      const chip = document.createElement('button');
      chip.className = 'reactionChip' + (users.includes(currentUser) ? ' mine' : '');
      chip.textContent = emoji + ' ' + users.length;
      chip.onclick = () => toggleReaction(m.id, emoji);
      reactionsRow.appendChild(chip);
    });
    if (reactionsRow.children.length > 0) div.appendChild(reactionsRow);

    // actions: reply + react
    const actions = document.createElement('div');
    actions.className = 'msgActions';

    const replyBtn = document.createElement('button');
    replyBtn.className = 'actionBtn';
    replyBtn.textContent = '↩ رد';
    replyBtn.onclick = () => startReply(m.id, m.user, m.text);
    actions.appendChild(replyBtn);

    const reactBtn = document.createElement('button');
    reactBtn.className = 'actionBtn';
    reactBtn.textContent = '😀 تفاعل';
    reactBtn.onclick = (ev) => {
      ev.stopPropagation();
      const picker = div.querySelector('.emojiPicker');
      document.querySelectorAll('.emojiPicker.show').forEach(p => { if (p !== picker) p.classList.remove('show'); });
      picker.classList.toggle('show');
    };
    actions.appendChild(reactBtn);
    div.appendChild(actions);

    // emoji picker
    const picker = document.createElement('div');
    picker.className = 'emojiPicker';
    REACTION_EMOJIS.forEach(emoji => {
      const span = document.createElement('span');
      span.textContent = emoji;
      span.onclick = () => { toggleReaction(m.id, emoji); picker.classList.remove('show'); };
      picker.appendChild(span);
    });
    div.appendChild(picker);

    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

window.startReply = function(id, user, text) {
  replyingTo = { id, user, text };
  document.getElementById('replyBarText').textContent = 'بترد على ' + user + ': ' + text.slice(0, 50);
  document.getElementById('replyBar').classList.add('show');
  document.getElementById('msgInput').focus();
};
window.cancelReply = function() {
  replyingTo = null;
  document.getElementById('replyBar').classList.remove('show');
};

async function toggleReaction(msgId, emoji) {
  if (!currentUser) return;
  const msg = latestMessages.find(m => m.id === msgId);
  if (!msg) return;
  const reactions = msg.reactions ? JSON.parse(JSON.stringify(msg.reactions)) : {};
  const users = reactions[emoji] || [];
  const idx = users.indexOf(currentUser);
  if (idx >= 0) {
    users.splice(idx, 1);
  } else {
    users.push(currentUser);
  }
  reactions[emoji] = users;
  try {
    await updateDoc(doc(db, "messages", msgId), { reactions: reactions });
  } catch (e) {
    console.error('reaction error', e);
  }
}

window.sendMessage = async function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  input.value = '';
  input.disabled = true;

  try {
    const msgId = Date.now().toString() + '-' + Math.random().toString(36).slice(2, 8);
    const payload = {
      user: currentUser,
      text: text,
      time: Date.now(),
      reactions: {}
    };
    if (replyingTo) {
      payload.replyTo = replyingTo.id;
    }
    await setDoc(doc(db, "messages", msgId), payload);
    cancelReply();
  } catch (e) {
    console.error('Send error:', e);
    alert('حصل خطأ وإحنا بنبعت الرسالة، حاول تاني');
    input.value = text;
  } finally {
    input.disabled = false;
    input.focus();
  }
};
</script>
